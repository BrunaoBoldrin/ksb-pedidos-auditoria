name: Migrar SQLite para PostgreSQL

on:
  workflow_dispatch:
    inputs:
      limpar_destino:
        description: "Apagar dados atuais do PostgreSQL antes de importar?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  migrar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          ref: teste

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary

      - name: Executar migração sem limpar destino
        if: ${{ github.event.inputs.limpar_destino == 'false' }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
        run: |
          python migrar_sqlite_para_postgres.py --sqlite database.db

      - name: Executar migração limpando destino
        if: ${{ github.event.inputs.limpar_destino == 'true' }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
        run: |
          python migrar_sqlite_para_postgres.py --sqlite database.db --limpar-destino
